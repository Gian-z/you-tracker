<header class="topbar">
  <span class="brand">you-tracker</span>
  <nav class="main-nav">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Dashboard</a>
    <a routerLink="/tasks" routerLinkActive="active">Tasks</a>
    <a routerLink="/week" routerLinkActive="active">Week</a>
    <a routerLink="/sprint" routerLinkActive="active">Sprint</a>
    <a routerLink="/assistant" routerLinkActive="active">Assistant</a>
  </nav>
  <span class="flex-spacer"></span>
  <span class="dev-picker" [class.other-dev]="!dev.isSelf()" title="Whose tickets and bookings to show">
    @if (dev.users().length > 0) {
      <select [value]="dev.selectedLogin()" (change)="onDevChange($event)" aria-label="Developer">
        @for (u of dev.users(); track u.login) {
          <option
            [value]="u.login"
            [selected]="u.login.toLowerCase() === dev.selectedLogin().toLowerCase()"
          >
            {{ u.fullName }} ({{ u.login }})
          </option>
        }
      </select>
    } @else {
      <input
        type="text"
        [value]="dev.selectedLogin()"
        (change)="onDevChange($event)"
        placeholder="dev login"
        aria-label="Developer login"
        size="10"
      />
    }
    @if (!dev.isSelf()) {
      <span class="viewing-badge">viewing {{ dev.selectedName() }}</span>
    }
  </span>
  @if (timerError(); as err) {
    <span class="timer-error" (click)="timerError.set(null)" title="Click to dismiss">{{ err }}</span>
  }
  @if (timer.state(); as t) {
    <button
      type="button"
      class="timer-widget running"
      (click)="stopTimer()"
      [disabled]="stopping()"
      [title]="'Stop timer for ' + t.issueId + ' – ' + t.issueSummary"
    >
      <span class="timer-dot"></span>
      ▶ {{ t.issueId }} <span class="timer-clock">{{ elapsed() }}</span>
    </button>
  } @else {
    <span class="timer-widget idle" title="Start a timer from the task list">no timer</span>
  }
</header>

<main class="content">
  <router-outlet />
</main>

@if (stopResult(); as r) {
  <app-log-time-dialog
    [issueId]="r.issueId"
    [issueSummary]="r.issueSummary"
    [initialMinutes]="r.elapsedMinutes"
    [initialDate]="r.date"
    (saved)="onStopLogSaved()"
    (closed)="stopResult.set(null)"
  />
}
